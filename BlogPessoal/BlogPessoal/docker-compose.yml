services:
  postgres:
    image: postgres:16
    container_name: blog-pessoal-postgres
    environment:
      POSTGRES_DB: blog_pessoal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - blog_pessoal_pgdata:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    container_name: blog-pessoal-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  blog_pessoal_pgdata:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
